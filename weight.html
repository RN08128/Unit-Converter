<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@100..800&display=swap');
    </style>
</head>

<body>
    <section>
        <div id="menu">
            <h1>
                <a href="main.html">Unit Converter</a>
            </h1>
            <a href="length.html" class="options">Length</a>
            <a href="weight.html" class="options" style="color: rgb(0, 110, 255); text-decoration: underline;">Weight</a>
            <a href="temperature.html" class="options">Temperature</a>
            <content>
                <p>Enter the weight to convert: </p>
                <input type="text" class="inputs">
                <p>Unit to Convert from: </p>
                <select name="Temperatures" id="" class="inputselect">
                    <option value="Kilograms">Kilograms (kg)</option>
                    <option value="Miligram">Miligram (mg)</option>
                    <option value="Gram">Gram (g)</option>
                    <option value="Pound">Pound (lb)</option>
                    <option value="Ounce">Ounce (oz)</option>
                </select>
                <p>Unit to Convert to: </p>
                <select name="Temperatures" id="" class="inputselect">
                    <option value="Kilograms">Kilograms (kg)</option>
                    <option value="Miligram">Miligram (mg)</option>
                    <option value="Gram">Gram (g)</option>
                    <option value="Pound">Pound (lb)</option>
                    <option value="Ounce">Ounce (oz)</option>
                </select>
                <button type="submit">Convert</button>
            </content>
        </div>
    </section>
</body>

</html>
