<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans+Hebrew:wght@100..800&display=swap');
    </style>
</head>

<body>
    <section>
        <div id="menu">
            <h1>
                <a href="main.html">Unit Converter</a>
            </h1>
            <a href="length.html" class="options">Length</a>
            <a href="weight.html" class="options">Weight</a>
            <a href="temperature.html" class="options"
                style="color: rgb(0, 110, 255); text-decoration: underline;">Temperature</a>
            <content>
                <p>Enter the temperature to convert:</p>
                <input type="text" class="inputs">
                <p>Unit to Convert from:</p>
                <select name="temperatures" id="" class="inputselect">
                    <option value="Celsius">Celsius (C°)</option>
                    <option value="Fahrenheit">Fahrenheit (F°)</option>
                    <option value="Kelvin">Kelvin (K)</option>
                </select>
                <p>Unit to Convert to:</p>
                <select name="temperatures" id="" class="inputselect">
                    <option value="Celsius">Celsius (C°)</option>
                    <option value="Fahrenheit">Fahrenheit (F°)</option>
                    <option value="Kelvin">Kelvin (K)</option>
                </select>
                <button type="submit">Convert</button>
            </content>
        </div>
    </section>
</body>

<script src="index.js"></script>

</html>
